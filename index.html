<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>meomeo</title>
  <meta name="description" content="A curated Cydia & Sileo repository for iOS tweaks." />

  <!-- Favicon -->
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=sf-pro-display:400,500,600,700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="noise"></div>

  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/">
        <img class="brand-logo" src="icon.svg" alt="meomeo" width="28" height="28" />
        <span class="brand-name">meomeo</span>
      </a>
      <nav>
        <a class="add-btn" id="addRepoBtn" href="#" onclick="addToManager(event)">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Add Repo
        </a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-badge">Cydia &amp; Sileo Compatible</div>
      <h1 class="hero-title">meomeo<br><em>repo.</em></h1>
      <div class="repo-url-box">
        <code id="repoUrl">loading…</code>
        <button onclick="copyUrl()" title="Copy URL">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 11V3a2 2 0 0 1 2-2h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </section>

    <section class="tweaks-section">
      <div class="section-header">
        <h2>Packages</h2>
        <span class="pkg-count" id="pkgCount">—</span>
      </div>
      <div class="tweaks-grid" id="tweaksGrid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal" id="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast">Copied!</div>

  <footer id="siteFooter">
    <p>meomeo · <a id="footerGithub" href="#" target="_blank">GitHub</a><span id="footerMeta"></span></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
