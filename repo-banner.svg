<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141428"/>
    </linearGradient>
    <linearGradient id="p" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2997ff"/>
      <stop offset="100%" stop-color="#bf7fff"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="750" height="300" fill="url(#g)"/>
  <!-- subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="750" height="300" fill="url(#grid)"/>
  <!-- paw icon large right side -->
  <g transform="translate(520,80) scale(1.4)" opacity="0.12">
    <ellipse cx="60" cy="72" rx="20" ry="16" fill="white"/>
    <ellipse cx="42" cy="55" rx="8" ry="9" fill="white"/>
    <ellipse cx="56" cy="48" rx="8" ry="9" fill="white"/>
    <ellipse cx="70" cy="48" rx="8" ry="9" fill="white"/>
    <ellipse cx="83" cy="55" rx="8" ry="9" fill="white"/>
  </g>
  <!-- paw icon solid left -->
  <g transform="translate(60,85) scale(0.9)">
    <ellipse cx="60" cy="72" rx="20" ry="16" fill="url(#p)"/>
    <ellipse cx="42" cy="55" rx="8" ry="9" fill="url(#p)"/>
    <ellipse cx="56" cy="48" rx="8" ry="9" fill="url(#p)"/>
    <ellipse cx="70" cy="48" rx="8" ry="9" fill="url(#p)"/>
    <ellipse cx="83" cy="55" rx="8" ry="9" fill="url(#p)"/>
  </g>
  <!-- text -->
  <text x="200" y="130" font-family="-apple-system,Helvetica Neue,sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="-2">meomeo</text>
  <text x="200" y="170" font-family="-apple-system,Helvetica Neue,sans-serif" font-size="20" fill="rgba(255,255,255,0.5)" letter-spacing="0.5">iOS Jailbreak Repository</text>
  <!-- accent line -->
  <rect x="200" y="185" width="80" height="3" rx="2" fill="url(#p)"/>
</svg>